<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fano Grassmannian Rotor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a0f;
      --fg: #eef4ff;
      --muted: #91a0b7;
      --cyan: #55d7ff;
      --green: #7cffb2;
      --gold: #ffd166;
      --pink: #ff6b9d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 42%, #151922 0, var(--bg) 62%);
      color: var(--fg);
      font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .panel {
      position: fixed;
      left: 18px;
      top: 18px;
      max-width: min(420px, calc(100vw - 36px));
      padding: 14px 16px;
      border: 1px solid rgba(238, 244, 255, 0.18);
      background: rgba(8, 10, 15, 0.72);
      backdrop-filter: blur(14px);
      border-radius: 8px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .stats {
      display: grid;
      grid-template-columns: auto auto;
      gap: 4px 14px;
      color: var(--muted);
      white-space: nowrap;
    }

    .stats strong {
      color: var(--fg);
      font-weight: 600;
    }

    .legend {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: grid;
      gap: 7px;
      padding: 12px 14px;
      border: 1px solid rgba(238, 244, 255, 0.16);
      background: rgba(8, 10, 15, 0.66);
      backdrop-filter: blur(14px);
      border-radius: 8px;
      color: var(--muted);
    }

    .key {
      display: grid;
      grid-template-columns: 14px auto;
      align-items: center;
      gap: 9px;
    }

    .swatch {
      width: 14px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <canvas id="scene" aria-label="Rotating Fano Grassmannian triangle mesh"></canvas>
  <section class="panel">
    <h1>Fano Grassmannian Rotor</h1>
    <div class="stats">
      <span>carrier</span><strong>Fin 8 / visible 001..111</strong>
      <span>root</span><strong>000 outside mesh</strong>
      <span>lines</span><strong>7 XOR-zero triangles</strong>
      <span>pair gates</span><strong>21 inside Gr(2,12)</strong>
    </div>
  </section>
  <section class="legend">
    <div class="key"><span class="swatch" style="background: var(--cyan)"></span><span>visible Fano point</span></div>
    <div class="key"><span class="swatch" style="background: var(--green)"></span><span>XOR line triangle</span></div>
    <div class="key"><span class="swatch" style="background: var(--gold)"></span><span>canonical pair gate</span></div>
    <div class="key"><span class="swatch" style="background: var(--pink)"></span><span>000 root position</span></div>
  </section>
  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");

    const points = [
      { id: 1, label: "001", p: [-1, -1, -1] },
      { id: 2, label: "010", p: [-1, 1, -1] },
      { id: 3, label: "011", p: [-1, 1, 1] },
      { id: 4, label: "100", p: [1, -1, -1] },
      { id: 5, label: "101", p: [1, -1, 1] },
      { id: 6, label: "110", p: [1, 1, -1] },
      { id: 7, label: "111", p: [1, 1, 1] },
    ];

    const byId = new Map(points.map((point) => [point.id, point]));
    const lines = [];
    const seen = new Set();

    for (const a of points) {
      for (const b of points) {
        if (a.id >= b.id) continue;
        const c = a.id ^ b.id;
        const triple = [a.id, b.id, c].sort((x, y) => x - y);
        const key = triple.join("-");
        if (!seen.has(key)) {
          seen.add(key);
          lines.push(triple);
        }
      }
    }

    const edges = [];
    for (const a of points) {
      for (const b of points) {
        if (a.id < b.id) edges.push([a.id, b.id]);
      }
    }

    function resize() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function rotate([x, y, z], t) {
      const ax = t * 0.37;
      const ay = t * 0.51;
      const az = t * 0.23;
      let cy = Math.cos(ay), sy = Math.sin(ay);
      let nx = x * cy + z * sy;
      let nz = -x * sy + z * cy;
      x = nx; z = nz;
      let cx = Math.cos(ax), sx = Math.sin(ax);
      let ny = y * cx - z * sx;
      nz = y * sx + z * cx;
      y = ny; z = nz;
      let cz = Math.cos(az), sz = Math.sin(az);
      nx = x * cz - y * sz;
      ny = x * sz + y * cz;
      return [nx, ny, nz];
    }

    function project(point, width, height) {
      const depth = 4.4;
      const scale = Math.min(width, height) * 0.34;
      const k = scale / (depth - point[2]);
      return {
        x: width / 2 + point[0] * k,
        y: height / 2 + point[1] * k,
        z: point[2],
        k,
      };
    }

    function drawLine(a, b, color, width, alpha) {
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function draw(t) {
      const width = innerWidth;
      const height = innerHeight;
      ctx.clearRect(0, 0, width, height);

      const projected = new Map();
      for (const point of points) {
        projected.set(point.id, project(rotate(point.p, t), width, height));
      }
      const root = project(rotate([0, 0, 0], t), width, height);

      const orderedFaces = lines
        .map((line) => ({
          line,
          z: line.reduce((sum, id) => sum + projected.get(id).z, 0) / 3,
        }))
        .sort((a, b) => a.z - b.z);

      for (const face of orderedFaces) {
        const tri = face.line.map((id) => projected.get(id));
        ctx.globalAlpha = 0.105 + Math.max(0, face.z) * 0.025;
        ctx.fillStyle = "#7cffb2";
        ctx.beginPath();
        ctx.moveTo(tri[0].x, tri[0].y);
        ctx.lineTo(tri[1].x, tri[1].y);
        ctx.lineTo(tri[2].x, tri[2].y);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      for (const [a, b] of edges) {
        const pa = projected.get(a);
        const pb = projected.get(b);
        drawLine(pa, pb, "#ffd166", 1.05, 0.22);
      }

      for (const line of lines) {
        for (let i = 0; i < 3; i += 1) {
          const a = projected.get(line[i]);
          const b = projected.get(line[(i + 1) % 3]);
          drawLine(a, b, "#7cffb2", 2.1, 0.72);
        }
      }

      ctx.fillStyle = "#ff6b9d";
      ctx.beginPath();
      ctx.arc(root.x, root.y, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ff9dbb";
      ctx.fillText("000", root.x + 11, root.y - 10);

      const pointOrder = [...points].sort((a, b) => projected.get(a.id).z - projected.get(b.id).z);
      for (const point of pointOrder) {
        const p = projected.get(point.id);
        const radius = 8 + p.k * 0.018;
        ctx.fillStyle = "#55d7ff";
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(238, 244, 255, 0.7)";
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = "#eef4ff";
        ctx.fillText(point.label, p.x + 11, p.y - 10);
      }

      requestAnimationFrame((next) => draw(next / 1000));
    }

    addEventListener("resize", resize);
    resize();
    requestAnimationFrame((now) => draw(now / 1000));
  </script>
</body>
</html>
